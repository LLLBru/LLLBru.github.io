<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPulse - 健身打卡系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent-cyan: #00f5d4;
            --accent-orange: #ff6b35;
            --accent-pink: #f72585;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9e;
            --text-muted: #4a4a5a;
            --border-color: #2a2a3a;
            --gradient-main: linear-gradient(135deg, #00f5d4 0%, #00bbf9 50%, #9b5de5 100%);
            --gradient-warm: linear-gradient(135deg, #ff6b35 0%, #f72585 100%);
            --shadow-glow: 0 0 40px rgba(0, 245, 212, 0.15);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(0, 245, 212, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(155, 93, 229, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 50% 30% at 50% 90%, rgba(255, 107, 53, 0.06) 0%, transparent 50%);
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: 4px;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 1rem;
            color: var(--text-secondary);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 400px 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px;
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .card:hover {
            border-color: rgba(0, 245, 212, 0.3);
            box-shadow: var(--shadow-glow);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .card-icon.cyan {
            background: linear-gradient(135deg, rgba(0, 245, 212, 0.2), rgba(0, 187, 249, 0.2));
            border: 1px solid rgba(0, 245, 212, 0.3);
        }

        .card-icon.orange {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(247, 37, 133, 0.2));
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .card-title {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sport-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .sport-option {
            position: relative;
        }

        .sport-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .sport-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px 16px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sport-option label:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 245, 212, 0.05);
        }

        .sport-option input:checked + label {
            border-color: var(--accent-cyan);
            background: linear-gradient(135deg, rgba(0, 245, 212, 0.1), rgba(0, 187, 249, 0.1));
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.2);
        }

        .sport-emoji {
            font-size: 2rem;
        }

        .sport-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .sport-cal {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.15);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-primary {
            width: 100%;
            padding: 18px 32px;
            background: var(--gradient-main);
            border: none;
            border-radius: 12px;
            color: var(--bg-primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 245, 212, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 245, 212, 0.3);
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .search-section {
            margin-bottom: 24px;
        }

        .search-box {
            display: flex;
            gap: 12px;
        }

        .search-box .form-input {
            flex: 1;
        }

        .btn-search {
            padding: 16px 24px;
            background: transparent;
            border: 2px solid var(--accent-orange);
            border-radius: 12px;
            color: var(--accent-orange);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-search:hover {
            background: rgba(255, 107, 53, 0.1);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.2);
        }

        .records-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .records-list::-webkit-scrollbar {
            width: 6px;
        }

        .records-list::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        .records-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .records-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }

        .record-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .record-item:hover {
            border-color: rgba(0, 245, 212, 0.3);
            background: rgba(0, 245, 212, 0.02);
        }

        .record-emoji {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .record-emoji.running { background: linear-gradient(135deg, rgba(0, 245, 212, 0.2), rgba(0, 187, 249, 0.2)); }
        .record-emoji.swimming { background: linear-gradient(135deg, rgba(0, 187, 249, 0.2), rgba(155, 93, 229, 0.2)); }
        .record-emoji.gym { background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(247, 37, 133, 0.2)); }
        .record-emoji.yoga { background: linear-gradient(135deg, rgba(155, 93, 229, 0.2), rgba(247, 37, 133, 0.2)); }

        .record-info {
            flex: 1;
        }

        .record-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .record-meta {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .record-cal {
            text-align: right;
        }

        .record-cal-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .record-cal-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1rem;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            padding: 16px 28px;
            background: var(--gradient-main);
            border-radius: 12px;
            color: var(--bg-primary);
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0, 245, 212, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .delete-btn {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--accent-pink);
            border-radius: 8px;
            color: var(--accent-pink);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .record-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(247, 37, 133, 0.1);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="noise-overlay"></div>
    
    <div class="container">
        <header>
            <h1 class="logo">FITPULSE</h1>
            <p class="tagline">Track Your Progress</p>
        </header>

        <div class="main-grid">
            <div class="card" style="animation-delay: 0.1s;">
                <div class="card-header">
                    <div class="card-icon cyan">
                        <span>💪</span>
                    </div>
                    <h2 class="card-title">运动打卡</h2>
                </div>

                <form id="checkinForm">
                    <div class="form-group">
                        <label class="form-label">选择运动类型</label>
                        <div class="sport-grid">
                            <div class="sport-option">
                                <input type="radio" name="sport" id="running" value="running" data-cal="8" checked>
                                <label for="running">
                                    <span class="sport-emoji">🏃</span>
                                    <span class="sport-name">跑步</span>
                                    <span class="sport-cal">8 kcal/min</span>
                                </label>
                            </div>
                            <div class="sport-option">
                                <input type="radio" name="sport" id="swimming" value="swimming" data-cal="10">
                                <label for="swimming">
                                    <span class="sport-emoji">🏊</span>
                                    <span class="sport-name">游泳</span>
                                    <span class="sport-cal">10 kcal/min</span>
                                </label>
                            </div>
                            <div class="sport-option">
                                <input type="radio" name="sport" id="gym" value="gym" data-cal="6">
                                <label for="gym">
                                    <span class="sport-emoji">🏋️</span>
                                    <span class="sport-name">健身房</span>
                                    <span class="sport-cal">6 kcal/min</span>
                                </label>
                            </div>
                            <div class="sport-option">
                                <input type="radio" name="sport" id="yoga" value="yoga" data-cal="5">
                                <label for="yoga">
                                    <span class="sport-emoji">🧘</span>
                                    <span class="sport-name">瑜伽</span>
                                    <span class="sport-cal">5 kcal/min</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">运动日期</label>
                        <input type="date" class="form-input" id="dateInput" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">运动时长 (分钟)</label>
                        <input type="number" class="form-input" id="durationInput" placeholder="输入运动时长" min="1" required>
                    </div>

                    <button type="submit" class="btn-primary">立即打卡</button>
                </form>
            </div>

            <div class="card" style="animation-delay: 0.2s;">
                <div class="card-header">
                    <div class="card-icon orange">
                        <span>📊</span>
                    </div>
                    <h2 class="card-title">运动数据</h2>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalRecords">0</div>
                        <div class="stat-label">打卡次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalTime">0</div>
                        <div class="stat-label">总时长 (分钟)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalCal">0</div>
                        <div class="stat-label">消耗卡路里</div>
                    </div>
                </div>

                <div class="search-section">
                    <div class="search-box">
                        <input type="date" class="form-input" id="searchDate" placeholder="YYYY-MM-DD" style="color-scheme: dark;">
                        <button class="btn-search" id="searchBtn">查询</button>
                        <button class="btn-search" id="showAllBtn" style="border-color: var(--accent-cyan); color: var(--accent-cyan);">全部</button>
                    </div>
                </div>

                <div class="records-list" id="recordsList">
                    <div class="empty-state">
                        <div class="empty-icon">🎯</div>
                        <p class="empty-text">暂无打卡记录，开始你的第一次运动吧！</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const sportConfig = {
            running: { name: '跑步', emoji: '🏃', calPerMin: 8 },
            swimming: { name: '游泳', emoji: '🏊', calPerMin: 10 },
            gym: { name: '健身房', emoji: '🏋️', calPerMin: 6 },
            yoga: { name: '瑜伽', emoji: '🧘', calPerMin: 5 }
        };

        let records = JSON.parse(localStorage.getItem('fitnessRecords') || '[]');

        function init() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateInput').value = today;
            
            renderRecords(records);
            updateStats();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateStats() {
            const totalRecords = records.length;
            const totalTime = records.reduce((sum, r) => sum + r.duration, 0);
            const totalCal = records.reduce((sum, r) => sum + r.calories, 0);

            animateValue('totalRecords', totalRecords);
            animateValue('totalTime', Math.round(totalTime));
            animateValue('totalCal', Math.round(totalCal));
        }

        function animateValue(elementId, endValue) {
            const element = document.getElementById(elementId);
            const startValue = parseInt(element.textContent) || 0;
            const duration = 500;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const currentValue = Math.round(startValue + (endValue - startValue) * easeProgress);
                element.textContent = currentValue;
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function renderRecords(recordsToRender) {
            const container = document.getElementById('recordsList');
            
            if (recordsToRender.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎯</div>
                        <p class="empty-text">暂无打卡记录</p>
                    </div>
                `;
                return;
            }

            const sortedRecords = [...recordsToRender].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            container.innerHTML = sortedRecords.map((record, index) => {
                const sport = sportConfig[record.sport];
                return `
                    <div class="record-item" style="animation-delay: ${index * 0.05}s;">
                        <div class="record-emoji ${record.sport}">${sport.emoji}</div>
                        <div class="record-info">
                            <div class="record-name">${sport.name}</div>
                            <div class="record-meta">
                                <span>📅 ${record.date}</span>
                                <span>⏱️ ${record.duration} 分钟</span>
                            </div>
                        </div>
                        <div class="record-cal">
                            <div class="record-cal-value">${Math.round(record.calories)}</div>
                            <div class="record-cal-label">千卡</div>
                        </div>
                        <button class="delete-btn" onclick="deleteRecord('${record.id}')">删除</button>
                    </div>
                `;
            }).join('');
        }

        function deleteRecord(id) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem('fitnessRecords', JSON.stringify(records));
            renderRecords(records);
            updateStats();
            showToast('记录已删除');
        }

        document.getElementById('checkinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const sport = document.querySelector('input[name="sport"]:checked').value;
            const date = document.getElementById('dateInput').value;
            const duration = parseFloat(document.getElementById('durationInput').value);

            if (!date || !duration || duration <= 0) {
                showToast('请填写完整信息');
                return;
            }

            const calories = sportConfig[sport].calPerMin * duration;
            
            const newRecord = {
                id: Date.now().toString(),
                sport,
                date,
                duration,
                calories
            };

            records.push(newRecord);
            localStorage.setItem('fitnessRecords', JSON.stringify(records));
            
            renderRecords(records);
            updateStats();
            
            document.getElementById('durationInput').value = '';
            showToast(`打卡成功！消耗 ${Math.round(calories)} 千卡`);
        });

        document.getElementById('searchBtn').addEventListener('click', function() {
            const searchDate = document.getElementById('searchDate').value;
            if (!searchDate) {
                showToast('请选择日期');
                return;
            }
            const filtered = records.filter(r => r.date === searchDate);
            renderRecords(filtered);
        });

        document.getElementById('showAllBtn').addEventListener('click', function() {
            document.getElementById('searchDate').value = '';
            renderRecords(records);
        });

        init();
    </script>
</body>
</html>
